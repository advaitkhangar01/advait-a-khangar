<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Cyberpunk premium dark background with soft corner curves -->
  <rect width="512" height="512" rx="112" fill="#0E0F12" />
  
  <!-- Subtle futuristic HUD frame accents -->
  <path d="M72 136 V72 H136" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M440 136 V72 H376" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M72 376 V440 H136" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M440 376 V440 H376" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />

  <!-- Outer ambient glow path behind the 'A' monogram -->
  <circle cx="256" cy="256" r="140" fill="url(#coreGlow)" opacity="0.15" />

  <!-- Elegant Geometric Monogram 'A' -->
  <g>
    <!-- Left diagonal pillar with gold gradient -->
    <path d="M 133.12 399.36 L 240.64 158.72" stroke="url(#goldGrad)" stroke-width="46" stroke-linecap="round" />
    
    <!-- Right diagonal pillar with gold gradient -->
    <path d="M 378.88 399.36 L 271.36 158.72" stroke="url(#goldGrad)" stroke-width="46" stroke-linecap="round" />
    
    <!-- Left Crossbar segment -->
    <path d="M 184.32 281.6 H 225.28" stroke="url(#goldGrad)" stroke-width="30.72" stroke-linecap="round" />
    
    <!-- Right Crossbar segment -->
    <path d="M 327.68 281.6 H 286.72" stroke="url(#goldGrad)" stroke-width="30.72" stroke-linecap="round" />
    
    <!-- Center AI Node with gold/white glow -->
    <circle cx="256" cy="281.6" r="23.04" fill="#FAFAF8" filter="url(#nodeGlow)" />
    
    <!-- Floating top diamond accent -->
    <path d="M 256 71.68 L 286.72 102.4 L 256 133.12 L 225.28 102.4 Z" fill="url(#goldGrad)" />
  </g>

  <!-- Definitions for Gradients and Filters -->
  <defs>
    <linearGradient id="goldGrad" x1="133.12" y1="399.36" x2="271.36" y2="158.72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A6916" />
      <stop offset="30%" stop-color="#C9A227" />
      <stop offset="60%" stop-color="#F5D061" />
      <stop offset="85%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#A27E1C" />
    </linearGradient>
    
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0" />
    </radialGradient>

    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>