<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Cyberpunk premium dark background with soft corner curves -->
  <rect width="512" height="512" rx="112" fill="#0E0F12" />
  
  <!-- Subtle futuristic HUD frame accents -->
  <path d="M72 136 V72 H136" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M440 136 V72 H376" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M72 376 V440 H136" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
  <path d="M440 376 V440 H376" stroke="#C9A227" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />

  <!-- Outer ambient glow path behind the 'A' monogram -->
  <path d="M190 390 L242 160 H270 L322 390" stroke="#C9A227" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" />

  <!-- Elegant Geometric Monogram 'A' -->
  <g>
    <!-- Left diagonal pillar -->
    <path d="M190 390 L242 160 H270 L218 390 Z" fill="url(#goldGrad)" />
    <!-- Right diagonal pillar -->
    <path d="M322 390 L270 160 H242 L294 390 Z" fill="url(#goldGrad)" />
    <!-- Tech Crossbar -->
    <path d="M228 310 H284 V330 H228 Z" fill="#FAFAF8" opacity="0.85" />
    <!-- Floating top diamond accent -->
    <path d="M256 126 L266 110 L256 94 L246 110 Z" fill="#C9A227" />
  </g>

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="goldGrad" x1="190" y1="390" x2="322" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A227" />
      <stop offset="40%" stop-color="#E5C158" />
      <stop offset="70%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#8A6916" />
    </linearGradient>
  </defs>
</svg>